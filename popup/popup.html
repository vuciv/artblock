<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <h1>Artblock</h1>
      <p class="tagline">Every ad becomes a masterpiece</p>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Enabled</span>
      <label class="toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Hover controls</span>
      <label class="toggle">
        <input type="checkbox" id="showHoverControls" checked>
        <span class="slider"></span>
      </label>
    </div>
    <p class="feedback" id="hoverFeedback"></p>

    <button class="sources-btn" id="sourcesToggle">
      <span>Toggle Sources</span>
      <span class="sources-chevron">›</span>
    </button>

    <div class="sources-content" id="sourcesContent" hidden>
      <div class="toggle-row">
        <div class="toggle-label-group">
          <span class="toggle-label">Chaos Mode</span>
          <span class="toggle-desc">Toggle all sources</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="chaosMode">
          <span class="slider"></span>
        </label>
      </div>
      <div class="category-group">
        <div class="toggle-row">
          <span class="toggle-label">Impressionism</span>
          <label class="toggle"><input type="checkbox" id="cat-impressionism"><span class="slider"></span></label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Japanese Woodblock</span>
          <label class="toggle"><input type="checkbox" id="cat-japanese"><span class="slider"></span></label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Photography</span>
          <label class="toggle"><input type="checkbox" id="cat-photography"><span class="slider"></span></label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Renaissance</span>
          <label class="toggle"><input type="checkbox" id="cat-renaissance"><span class="slider"></span></label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Modern / Contemporary</span>
          <label class="toggle"><input type="checkbox" id="cat-modern"><span class="slider"></span></label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">NASA Space Imagery</span>
          <label class="toggle"><input type="checkbox" id="cat-space"><span class="slider"></span></label>
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-number" id="count">0</span>
        <span class="stat-label">ads replaced this session</span>
      </div>
    </div>

    <div class="profile-section">
      <div class="section-label">Your profile</div>
      
      <div class="data-row">
        <button class="action-btn" id="exportSettings">Export settings</button>
        <button class="action-btn" id="importSettings">Import settings</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div>
      <p class="feedback" id="profileFeedback"></p>

      <div class="reset-row" id="resetSiteRow" style="display:none">
        <button class="reset-btn" id="resetSite">Reset site settings</button>
      </div>

      <div class="reset-row">
        <button class="reset-btn" id="resetProfile">Reset profile</button>
      </div>
    </div>

    <div class="footer">
      <p>Art Institute of Chicago &middot; The Met &middot; NASA</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
